name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Unit / component tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: npm audit (high severity)
        run: npm audit --audit-level=high

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Lighthouse (accessibility / best-practices — informational only)
        if: always()
        continue-on-error: true
        run: |
          npm run preview -- --port 4173 &
          npx --yes wait-on http://127.0.0.1:4173 --timeout 30000
          npx --yes lighthouse http://127.0.0.1:4173 \
            --output=json --output-path=./lighthouse-report.json \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=accessibility,best-practices \
            --quiet

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report.json
          retention-days: 7
          if-no-files-found: ignore
